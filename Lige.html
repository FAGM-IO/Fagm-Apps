<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Lige Writer</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#eaeaea;
}
#loginScreen{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}
#loginBox{
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 0 10px rgba(0,0,0,.2);
    text-align:center;
    width:300px;
}
#loginBox input{
    width:95%;
    padding:10px;
    margin:8px 0;
}
#app{display:none;}
#toolbar{
    background:#222;
    color:white;
    padding:12px;
    display:flex;
    flex-wrap:wrap;
    gap:8px;
}
#toolbar button{
    padding:12px;
    font-size:16px;
    cursor:pointer;
}
#editor{
    width:90%;
    min-height:650px;
    margin:20px auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.1);
    border:1px solid #ccc;
}
table{
    border-collapse:collapse;
    width:100%;
}
th, td{
    border:2px solid black;
    padding:15px;
    min-width:60px;
}
</style>
</head>

<body>

<div id="loginScreen">
  <div id="loginBox">
    <h2>تسجيل الدخول إلى Lige</h2>
    <input id="user" placeholder="اسم المستخدم">
    <input id="pass" type="password" placeholder="كلمة المرور">
    <button onclick="login()">دخول</button>
    <p style="color:gray">سيتم حفظ كل شيء تلقائيًا</p>
  </div>
</div>

<div id="app">

<div id="toolbar">
<button onclick="align('left')">يسار</button>
<button onclick="align('center')">وسط</button>
<button onclick="align('right')">يمين</button>

<button onclick="insertTable()">إضافة جدول</button>
<button onclick="addList()">قائمة نقط</button>

<!-- زر الصورة المعدَّل -->
<button onclick="openImagePicker()">إضافة صورة</button>

<button onclick="clearEditor()">مسح الكل</button>
<button onclick="window.print()">طباعة</button>
</div>

<div id="editor" contenteditable="true">
اكتب هنا...
</div>

<!-- ده اللي بيطلع لك المعرض + الملفات بنفس شكل النظام -->
<input type="file" id="fileInput" accept="image/*" style="display:none;" multiple>

<script>
const EDITOR = document.getElementById("editor");
const APP = document.getElementById("app");
const LOGIN = document.getElementById("loginScreen");
const fileInput = document.getElementById("fileInput");

function login(){
    let u = document.getElementById("user").value.trim();
    let p = document.getElementById("pass").value.trim();

    if(u=="" || p==""){
        alert("اكتب الاسم وكلمة المرور");
        return;
    }
    localStorage.setItem("ligeUser", u);
    LOGIN.style.display="none";
    APP.style.display="block";
    loadData();
}

function align(dir){
    document.execCommand("justify"+dir.charAt(0).toUpperCase()+dir.slice(1));
}

/* ===== فتح المعرض/الملفات مباشرة (زي صورتك) ===== */
function openImagePicker(){
    fileInput.click();
}

/* ===== لما تختار صورة ===== */
fileInput.addEventListener("change", function(){
    const files = Array.from(this.files);

    files.forEach(file => {
        const reader = new FileReader();
        reader.onload = function(e){
            let img = document.createElement("img");
            img.src = e.target.result;
            img.style.maxWidth="100%";
            img.style.display="block";
            img.style.margin="10px 0";
            EDITOR.appendChild(img);
            autoSave();
        };
        reader.readAsDataURL(file);
    });

    fileInput.value = "";
});

/* ==== مسح المحتوى مع تأكيد ==== */
function clearEditor(){
    if(confirm("هل تريد فعلاً مسح كل المحتوى؟")){
        EDITOR.innerHTML = "";
        autoSave();
    }
}

function insertTable(){
    let rows = parseInt(prompt("عدد الصفوف؟", 3)) || 3;
    let cols = parseInt(prompt("عدد الأعمدة؟", 3)) || 3;

    let table = "<table><tbody>";
    for(let i=0;i<rows;i++){
        table += "<tr>";
        for(let j=0;j<cols;j++){
            table += "<td>&nbsp;</td>";
        }
        table += "</tr>";
    }
    table += "</tbody></table><br>";
    document.execCommand("insertHTML", false, table);
}

function addList(){
    document.execCommand("insertUnorderedList");
}

function autoSave(){
    localStorage.setItem("ligeDoc", EDITOR.innerHTML);
}

function loadData(){
    let saved = localStorage.getItem("ligeDoc");
    if(saved){
        EDITOR.innerHTML = saved;
    }
}

setInterval(autoSave, 5000);

if(localStorage.getItem("ligeUser")){
    LOGIN.style.display="none";
    APP.style.display="block";
    loadData();
}
</script>

</body>
</html>
