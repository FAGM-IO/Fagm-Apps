<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Excer-Drive</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f2f2f2;
    direction:rtl;
}
header{
    background:#1f1f1f;
    color:white;
    padding:15px;
    text-align:center;
    font-size:20px;
}
.container{
    padding:15px;
    max-width:650px;
    margin:auto;
}
.box{
    background:white;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
}
input, select{
    width:100%;
    padding:8px;
    margin-top:8px;
}
button{
    background:#1f1f1f;
    color:white;
    border:none;
    padding:8px 12px;
    border-radius:6px;
    cursor:pointer;
}
.file{
    background:white;
    padding:10px;
    border-radius:8px;
    margin-bottom:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
}
.file span{
    max-width:40%;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
}
.actions button{
    margin-right:4px;
}
.delete{background:red}
.share{background:#0077ff}
.move{background:#555}
.logout{background:#444;width:100%}
h3{margin-top:20px}
.hidden{display:none}
</style>
</head>

<body>

<header>☁️ Excer-Drive</header>

<div class="container">

<!-- LOGIN -->
<div class="box" id="loginBox">
<b>تسجيل دخول</b>
<input type="text" id="username" placeholder="اسم المستخدم">
<br><br>
<button onclick="login()">دخول</button>
</div>

<div id="app" class="hidden">



<div class="box">
<b>رفع ملف</b>
<input type="file" id="fileInput">
<select id="folderSelect"></select>
<br><br>
<button onclick="uploadFile()">رفع</button>
</div>

<div class="box">
<b>إنشاء مجلد</b>
<input type="text" id="newFolder" placeholder="اسم المجلد">
<br><br>
<button onclick="addFolder()">إنشاء</button>
</div>

<div class="box">
<b>بحث</b>
<input type="text" id="search" placeholder="ابحث..." oninput="showFiles()">
</div>

<div id="files"></div>

</div>
</div>

<script>
let user = localStorage.getItem("user");

let data = JSON.parse(localStorage.getItem("drive")) || {
    folders:["الرئيسية"],
    files:[]
};

function save(){
    localStorage.setItem("drive", JSON.stringify(data));
}

function login(){
    let u = username.value.trim();
    if(!u) return;
    localStorage.setItem("user",u);
    init();
}

function logout(){
    localStorage.removeItem("user");
    location.reload();
}

function init(){
    if(localStorage.getItem("user")){
        loginBox.classList.add("hidden");
        app.classList.remove("hidden");
        loadFolders();
        showFiles();
    }
}

function loadFolders(){
    folderSelect.innerHTML="";
    data.folders.forEach(f=>{
        folderSelect.innerHTML+=`<option>${f}</option>`;
    });
}

function addFolder(){
    let name = newFolder.value.trim();
    if(!name) return;
    if(data.folders.includes(name)) return alert("موجود");
    data.folders.push(name);
    save();
    loadFolders();
    newFolder.value="";
}

function uploadFile(){
    let file = fileInput.files[0];
    if(!file) return;
    let reader = new FileReader();
    reader.onload=e=>{
        data.files.push({
            id:Date.now(),
            name:file.name,
            data:e.target.result,
            folder:folderSelect.value
        });
        save();
        showFiles();
        fileInput.value="";
    }
    reader.readAsDataURL(file);
}

function showFiles(){
    files.innerHTML="";
    let q = search.value.toLowerCase();

    data.folders.forEach(folder=>{
        let list = data.files.filter(f=>f.folder===folder && f.name.toLowerCase().includes(q));
        if(!list.length) return;

        files.innerHTML+=`<h3>📁 ${folder}</h3>`;
        list.forEach(f=>{
            // escape علامات اقتباس الرابط
            const safeLink = f.data.replace(/'/g,"&#39;");
            files.innerHTML+=`
            <div class="file">
                <span>${f.name}</span>
                <div class="actions">
                    <select onchange="moveFile(${f.id},this.value)">
                        ${data.folders.map(fd=>`<option ${fd===f.folder?"selected":""}>${fd}</option>`)}
                    </select>
                    <a href="${f.data}" download="${f.name}">
                        <button>تحميل</button>
                    </a>
                    <button class="share" onclick="share('${safeLink}')">مشاركة</button>
                    <button class="delete" onclick="del(${f.id})">حذف</button>
                </div>
            </div>`;
        });
    });
}

function moveFile(id,folder){
    let f = data.files.find(x=>x.id===id);
    f.folder = folder;
    save();
    showFiles();
}

// تعديل وظيفة النسخ لتشتغل في كل المتصفحات والموبايل
function share(link){
    try{
        const temp = document.createElement("textarea");
        temp.value = link;
        document.body.appendChild(temp);
        temp.select();
        temp.setSelectionRange(0,99999); // للأجهزة المحمولة
        document.execCommand("copy");
        document.body.removeChild(temp);
        alert("تم نسخ رابط المشاركة");
    }catch(err){
        alert("فشل النسخ، حاول مرة أخرى");
    }
}

function del(id){
    if(confirm("حذف؟")){
        data.files = data.files.filter(f=>f.id!==id);
        save();
        showFiles();
    }
}

init();
</script>

</body>
</html>
